name: Perf Bench

on:
  schedule:
    - cron: '0 3 * * *'  # nightly at 03:00 UTC
  workflow_dispatch:
    inputs:
      clients:
        description: 'Number of bot clients'
        required: false
        default: '15'
      duration:
        description: 'Load duration in seconds'
        required: false
        default: '30'

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      BENCH_CLIENTS: ${{ github.event.inputs.clients || '15' }}
      BENCH_DURATION: ${{ github.event.inputs.duration || '30' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev --ignore-scripts

      - name: Install bench client deps
        run: npm i --no-save socket.io-client

      - name: Run baseline (previous main commit)
        run: |
          git checkout HEAD^
          GIT_REF=$(git rev-parse --short HEAD) node scripts/bench-run.js \
            --clients "$BENCH_CLIENTS" \
            --duration "$BENCH_DURATION" \
            --out bench-baseline.json
          git checkout -

      - name: Run candidate (HEAD)
        run: |
          GIT_REF=$(git rev-parse --short HEAD) node scripts/bench-run.js \
            --clients "$BENCH_CLIENTS" \
            --duration "$BENCH_DURATION" \
            --out bench-candidate.json

      - name: Compare and report
        run: node scripts/bench-compare.js bench-baseline.json bench-candidate.json --fail-on-regression

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-reports
          path: |
            bench-baseline.json
            bench-candidate.json
          retention-days: 14
