<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Zombie Game</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Courier New', Courier, monospace;
      background: #0d0d0d;
      color: #c8ff00;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.1em;
      color: #ff4444;
      border-bottom: 1px solid #333;
      padding-bottom: 8px;
      margin-bottom: 20px;
    }

    /* Auth form */
    #auth-screen {
      max-width: 400px;
      margin: 80px auto;
      border: 1px solid #333;
      padding: 32px;
      background: #111;
    }

    #auth-screen label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      color: #888;
    }

    #auth-screen input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a1a;
      border: 1px solid #444;
      color: #c8ff00;
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      margin-bottom: 16px;
    }

    #auth-screen input[type="password"]:focus { border-color: #c8ff00; }

    #auth-screen button {
      width: 100%;
      padding: 10px;
      background: #ff4444;
      border: none;
      color: #fff;
      font-family: inherit;
      font-size: 0.95rem;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    #auth-screen button:hover { background: #cc2222; }

    #auth-error {
      color: #ff4444;
      font-size: 0.8rem;
      margin-top: 8px;
      display: none;
    }

    /* Dashboard */
    #dashboard { display: none; }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      flex-wrap: wrap;
      gap: 10px;
    }

    .toolbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.8rem;
      color: #555;
    }

    #refresh-countdown { color: #888; }

    button.logout-btn {
      padding: 4px 12px;
      background: transparent;
      border: 1px solid #444;
      color: #888;
      font-family: inherit;
      font-size: 0.8rem;
      cursor: pointer;
    }

    button.logout-btn:hover { border-color: #ff4444; color: #ff4444; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid #222;
    }

    .tab-btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid transparent;
      border-bottom: none;
      color: #555;
      font-family: inherit;
      font-size: 0.85rem;
      cursor: pointer;
      letter-spacing: 0.04em;
    }

    .tab-btn:hover { color: #c8ff00; }
    .tab-btn.active { border-color: #333; border-bottom: 1px solid #0d0d0d; color: #c8ff00; background: #111; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Cards / data grid */
    .section-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .card {
      background: #111;
      border: 1px solid #222;
      padding: 16px;
    }

    .card-title {
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      text-transform: uppercase;
    }

    .kv-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px solid #1a1a1a;
      font-size: 0.85rem;
    }

    .kv-row:last-child { border-bottom: none; }
    .kv-key { color: #666; }
    .kv-val { color: #c8ff00; }

    /* Pre / raw JSON */
    .raw-block {
      background: #111;
      border: 1px solid #222;
      padding: 16px;
      font-size: 0.78rem;
      line-height: 1.6;
      overflow: auto;
      max-height: 60vh;
      white-space: pre-wrap;
      word-break: break-all;
    }

    /* Error list */
    .error-list { display: flex; flex-direction: column; gap: 10px; }

    .error-item {
      background: #111;
      border-left: 3px solid #ff4444;
      padding: 12px 16px;
      font-size: 0.82rem;
      word-break: break-word;
    }

    .error-item .err-meta { color: #555; font-size: 0.75rem; margin-bottom: 4px; }
    .error-item .err-msg  { color: #ffaaaa; }

    .status-bar {
      margin-top: 20px;
      font-size: 0.75rem;
      color: #444;
    }

    .spinner { color: #555; font-size: 0.85rem; margin: 40px auto; text-align: center; }
  </style>
</head>
<body>

<!-- Auth screen -->
<div id="auth-screen">
  <h1>// ZOMBIE ADMIN</h1>
  <label for="token-input">Bearer token</label>
  <input type="password" id="token-input" placeholder="*" autocomplete="current-password">
  <button id="auth-btn">CONNEXION</button>
  <p id="auth-error">Token invalide ou acces refuse.</p>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="toolbar">
    <h1>// ZOMBIE ADMIN</h1>
    <div class="toolbar-right">
      <span id="refresh-countdown">refresh: 5s</span>
      <button class="logout-btn" id="logout-btn">DECONNEXION</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="dashboard-tab">DASHBOARD</button>
    <button class="tab-btn" data-tab="metrics-tab">METRICS</button>
    <button class="tab-btn" data-tab="errors-tab">ERRORS</button>
    <button class="tab-btn" data-tab="telemetry-tab">TELEMETRY</button>
  </div>

  <div id="dashboard-tab" class="tab-panel active">
    <div id="dashboard-content" class="section-grid"></div>
  </div>
  <div id="metrics-tab" class="tab-panel">
    <pre id="metrics-content" class="raw-block"></pre>
  </div>
  <div id="errors-tab" class="tab-panel">
    <div id="errors-content" class="error-list"></div>
  </div>
  <div id="telemetry-tab" class="tab-panel">
    <pre id="telemetry-content" class="raw-block"></pre>
  </div>

  <div class="status-bar" id="status-bar">-</div>
</div>

<script>
(function () {
  'use strict';

  var SESSION_KEY = 'admin_token';
  var token = sessionStorage.getItem(SESSION_KEY) || '';
  var refreshTimer = null;
  var countdown = 5;
  var countdownTimer = null;

  var authScreen  = document.getElementById('auth-screen');
  var dashboard   = document.getElementById('dashboard');
  var tokenInput  = document.getElementById('token-input');
  var authBtn     = document.getElementById('auth-btn');
  var authError   = document.getElementById('auth-error');
  var logoutBtn   = document.getElementById('logout-btn');
  var statusBar   = document.getElementById('status-bar');
  var countdownEl = document.getElementById('refresh-countdown');

  // ── DOM helpers (no innerHTML with user data) ─────────────────

  function clearEl(el) {
    while (el.firstChild) el.removeChild(el.firstChild);
  }

  function makeCard(title) {
    var card = document.createElement('div'); card.className = 'card';
    var h    = document.createElement('div'); h.className = 'card-title';
    h.textContent = title;
    card.appendChild(h);
    return card;
  }

  function makeKV(key, val) {
    var row = document.createElement('div'); row.className = 'kv-row';
    var k   = document.createElement('span'); k.className = 'kv-key'; k.textContent = key;
    var v   = document.createElement('span'); v.className = 'kv-val'; v.textContent = val;
    row.appendChild(k); row.appendChild(v);
    return row;
  }

  function makeSpinner(msg) {
    var d = document.createElement('div'); d.className = 'spinner';
    d.textContent = msg || 'Chargement...';
    return d;
  }

  function flattenObject(obj, prefix) {
    prefix = prefix || '';
    var rows = [];
    Object.keys(obj).forEach(function (k) {
      var v   = obj[k];
      var key = prefix ? prefix + '.' + k : k;
      if (v !== null && typeof v === 'object' && !Array.isArray(v)) {
        rows = rows.concat(flattenObject(v, key));
      } else {
        rows.push([key, Array.isArray(v) ? JSON.stringify(v) : String(v)]);
      }
    });
    return rows;
  }

  // ── Auth ──────────────────────────────────────────────────────

  function showAuth() {
    authScreen.style.display = '';
    dashboard.style.display  = 'none';
    authError.style.display  = 'none';
    tokenInput.value = '';
    stopRefresh();
  }

  function showDashboard() {
    authScreen.style.display = 'none';
    dashboard.style.display  = '';
    startRefresh();
  }

  function tryLogin() {
    var candidate = tokenInput.value.trim();
    if (!candidate) return;
    probe(candidate, function (ok) {
      if (ok) {
        token = candidate;
        sessionStorage.setItem(SESSION_KEY, token);
        showDashboard();
      } else {
        authError.style.display = '';
      }
    });
  }

  function probe(t, cb) {
    fetch('/dashboard', { headers: { Authorization: 'Bearer ' + t } })
      .then(function (r) { cb(r.status !== 401 && r.status !== 403); })
      .catch(function () { cb(false); });
  }

  function logout() {
    token = '';
    sessionStorage.removeItem(SESSION_KEY);
    showAuth();
  }

  // ── API fetch ─────────────────────────────────────────────────

  function apiFetch(url) {
    return fetch(url, { headers: { Authorization: 'Bearer ' + token } })
      .then(function (r) {
        if (r.status === 401 || r.status === 403) { logout(); throw new Error('auth'); }
        return r;
      });
  }

  // ── Loaders ───────────────────────────────────────────────────

  function loadDashboard() {
    var el = document.getElementById('dashboard-content');
    clearEl(el);
    el.appendChild(makeSpinner());
    apiFetch('/dashboard')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        clearEl(el);
        var rows = flattenObject(data);
        var chunkSize = 6;
        for (var i = 0; i < rows.length; i += chunkSize) {
          var card = makeCard('INFO ' + (Math.floor(i / chunkSize) + 1));
          rows.slice(i, i + chunkSize).forEach(function (pair) {
            card.appendChild(makeKV(pair[0], pair[1]));
          });
          el.appendChild(card);
        }
        if (!rows.length) el.appendChild(makeSpinner('Aucune donnee.'));
      })
      .catch(function (e) {
        if (e.message !== 'auth') { clearEl(el); el.appendChild(makeSpinner('Erreur dashboard.')); }
      });
  }

  function loadMetrics() {
    var el = document.getElementById('metrics-content');
    el.textContent = 'Chargement...';
    apiFetch('/api/v1/metrics')
      .then(function (r) { return r.text(); })
      .then(function (t) { el.textContent = t; })
      .catch(function (e) { if (e.message !== 'auth') el.textContent = 'Erreur metrics.'; });
  }

  function loadErrors() {
    var el = document.getElementById('errors-content');
    clearEl(el);
    el.appendChild(makeSpinner());
    apiFetch('/debug/errors')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        clearEl(el);
        var list = Array.isArray(data) ? data : (data.errors || []);
        if (!list.length) {
          var ok = document.createElement('p');
          ok.style.color = '#4cff88';
          ok.textContent = 'Aucune erreur enregistree.';
          el.appendChild(ok);
          return;
        }
        list.forEach(function (err) {
          var item = document.createElement('div'); item.className = 'error-item';
          var meta = document.createElement('div'); meta.className = 'err-meta';
          meta.textContent = (err.timestamp || '') + (err.type ? '  [' + err.type + ']' : '');
          var msg  = document.createElement('div'); msg.className = 'err-msg';
          msg.textContent = err.message || err.msg || JSON.stringify(err);
          item.appendChild(meta);
          item.appendChild(msg);
          el.appendChild(item);
        });
      })
      .catch(function (e) {
        if (e.message !== 'auth') { clearEl(el); el.appendChild(makeSpinner('Erreur errors.')); }
      });
  }

  function loadTelemetry() {
    var el = document.getElementById('telemetry-content');
    el.textContent = 'Chargement...';
    apiFetch('/api/v1/metrics/telemetry')
      .then(function (r) { return r.json(); })
      .then(function (data) { el.textContent = JSON.stringify(data, null, 2); })
      .catch(function (e) { if (e.message !== 'auth') el.textContent = 'Erreur telemetry.'; });
  }

  // ── Refresh cycle ─────────────────────────────────────────────

  function refreshAll() {
    loadDashboard();
    loadMetrics();
    loadErrors();
    loadTelemetry();
    statusBar.textContent = 'Derniere mise a jour : ' + new Date().toLocaleTimeString();
    countdown = 5;
  }

  function startRefresh() {
    stopRefresh();
    refreshAll();
    refreshTimer   = setInterval(refreshAll, 5000);
    countdownTimer = setInterval(function () {
      countdown = Math.max(0, countdown - 1);
      countdownEl.textContent = 'refresh: ' + countdown + 's';
    }, 1000);
  }

  function stopRefresh() {
    clearInterval(refreshTimer);
    clearInterval(countdownTimer);
  }

  // ── Tabs ──────────────────────────────────────────────────────

  var tabBtns   = document.querySelectorAll('.tab-btn');
  var tabPanels = document.querySelectorAll('.tab-panel');

  tabBtns.forEach(function (btn) {
    btn.addEventListener('click', function () {
      tabBtns.forEach(function (b) { b.classList.remove('active'); });
      tabPanels.forEach(function (p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById(btn.dataset.tab).classList.add('active');
    });
  });

  // ── Listeners ─────────────────────────────────────────────────

  authBtn.addEventListener('click', tryLogin);
  tokenInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') tryLogin(); });
  logoutBtn.addEventListener('click', logout);

  // ── Boot ──────────────────────────────────────────────────────

  if (token) {
    probe(token, function (ok) { if (ok) showDashboard(); else showAuth(); });
  } else {
    showAuth();
  }

}());
</script>
</body>
</html>
