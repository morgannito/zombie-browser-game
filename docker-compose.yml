version: '3.8'

services:
  zombie-game:
    build: .
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=${PORT:-3000}
      - DB_PATH=/app/data/game.db
      - LOG_DIR=/app/logs
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000}
      - PERFORMANCE_MODE=${PERFORMANCE_MODE:-balanced}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET must be set}
      - ADMIN_TOKEN=${ADMIN_TOKEN:?ADMIN_TOKEN must be set}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    container_name: zombie-game
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:${PORT:-3000}/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
